name: Autograding R

on:
  push:

permissions:
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код студента
      - name: Checkout student code
        uses: actions/checkout@v5

      # 2. Скачиваем скрытые тесты
      - name: Fetch hidden tests
        uses: actions/checkout@v5
        with:
          repository: rantiquity/01_04_Functions_Tests
          token: ${{ secrets.TESTS_DOWNLOAD_TOKEN }}
          path: hidden_tests_dir

      # 3. Устанавливаем актуальную стабильную версию R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      # 4. Устанавливаем и кэшируем необходимые пакеты
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::sessioninfo
            any::testthat
            any::languageR
            any::gradethis
            github::rstudio/ggcheck
          cache-version: ${{ hashFiles('hidden_tests_dir/test_hidden.R') }}
          dependencies: '"hard"'
          install-pandoc: false
          install-quarto: false
          

      # 5. Запускаем скрытые тесты
      - name: Run hidden tests
        shell: Rscript {0}
        run: |
          results <- testthat::test_file(
            "hidden_tests_dir/test_hidden.R",
            reporter = "summary"
          )

          results_df <- as.data.frame(results)

          failed <- sum(results_df$failed, na.rm = TRUE)
          errors <- sum(results_df$error, na.rm = TRUE)
          warnings <- sum(results_df$warning, na.rm = TRUE)
          skipped <- sum(results_df$skipped, na.rm = TRUE)
          passed <- nrow(results_df) - failed - errors - warnings - skipped

          cat("\n")
          cat("=====================================\n")
          cat(sprintf(
            "[ PASS %d | FAIL %d | WARN %d | SKIP %d ]\n",
            passed, failed, warnings, skipped
          ))

          if (failed == 0 && errors == 0) {
            cat("🎉 Отлично! Все проверки успешно пройдены.\n")
          } else {
            cat("❌ Некоторые проверки не пройдены.\n")
            cat("Прокрутите журнал выше — там указано, какие именно проверки завершились ошибкой.\n")
            
            quit(status = 1)
          }

          cat("=====================================\n")
